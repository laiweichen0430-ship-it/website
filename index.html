            background-color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between; 
            align-items: center;
            border-bottom: 1px solid #e5e5e5;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-sizing: border-box;
        }

        .nav-logo {
            font-size: 20px;
            font-weight: bold;
            color: #0f0f0f;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1001;
            text-decoration: none;
        }

        .nav-menu {
            display: flex;
            gap: 40px; 
            align-items: center;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-contact-btn {
            background-color: #559696;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
            transition: background 0.2s;
            white-space: nowrap;
            z-index: 1001;
        }
        .nav-contact-btn:hover {
            background-color: #3f7373;
        }

        .nav-item {
            position: relative;
            font-size: 16px;
            font-weight: 500;
            color: #4a4a4a;
            cursor: pointer;
            padding: 10px 0; 
        }
        .nav-item:hover {
            color: #2b9393; 
        }

        .nav-dropdown {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 8px 0;
            min-width: 220px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            opacity: 0;
            pointer-events: none; 
            transition: all 0.3s ease;
            z-index: 2000;
        }

        .nav-item:hover .nav-dropdown {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }

        .dropdown-item {
            padding: 12px 20px;
            font-size: 14px;
            color: #4a4a4a;
            text-align: left;
            white-space: nowrap;
            transition: all 0.2s;

            background-color: rgba(85, 150, 150, 0.1);
            color: #2b9393;
        }

            align-items: center;

            border: none;

            border-radius: 15px;

            max-width: 1200px;
            margin: 0 auto;
            box-sizing: border-box;
        }

            position: fixed; 
            top: 65px; 
            left: 0;
            width: 100vw; 
            height: calc(100vh - 65px); 
            overflow-y: auto; 
            scroll-behavior: smooth; 
            background-color: #0f0f0f;
            z-index: 5;
        }

        .hero-bg-image {
            position: fixed; 
            top: calc(50% + 32px);
            left: 50%;
            width: 100%;
            height: calc(100vh - 65px);
            object-fit: cover;
            object-position: center;
            transform: translate(-50%, -50%);
            z-index: 1;
            transition: opacity 0.4s ease, transform 0.4s ease; 
        }

        .hero-section:has(.hero-link-card:hover) .hero-bg-image {
            opacity: 0.4; 
            transform: translate(-50%, -50%) scale(1.02); 
        }

        body:has(.nav-item:hover) .hero-bg-image {

            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));

            width: 100%;
        }

        .video-card {

        .modal-body { font-size: 16px; color: #212529; line-height: 1.8; }

    <script>
        // 🛠️ Google Drive 網址轉換小助手 (自動解析 ID 並轉成直連)
        function extractDriveId(urlOrId) {
            if (!urlOrId) return '';
            if (urlOrId.length < 20 && !urlOrId.includes('/') && !urlOrId.includes('.')) return urlOrId;
            const match = urlOrId.match(/\/d\/([a-zA-Z0-9_-]+)/) || urlOrId.match(/id=([a-zA-Z0-9_-]+)/);
            return match ? match[1] : urlOrId;
        }

        function getDriveImageUrl(urlOrId) {
            if (!urlOrId) return 'https://picsum.photos/600/350';
            if (urlOrId.startsWith('http://') || urlOrId.startsWith('https://')) {
                if (!urlOrId.includes('drive.google.com')) return urlOrId;
            }
            const id = extractDriveId(urlOrId);
            return id ? `https://lh3.googleusercontent.com/d/${id}` : urlOrId;
        }

        function getDriveEmbedUrl(urlOrId) {
            if (!urlOrId) return '';
            if (urlOrId.startsWith('http://') || urlOrId.startsWith('https://')) {
                if (!urlOrId.includes('drive.google.com')) return urlOrId;
            }
            const id = extractDriveId(urlOrId);
            return id ? `https://drive.google.com/file/d/${id}/preview` : urlOrId;

                            title: "podcast",  
                            cover: "https://drive.google.com/file/d/19pEGgfDlW0Xjc7uD-wopmGI-uGhUXiGc/view?usp=drive_link",

        };

        let navigationHistory = [websiteData]; 
        const contentWrapper = document.getElementById('contentWrapper');
        const breadcrumbWrapper = document.getElementById('breadcrumbWrapper');

        // 📝 核心渲染邏輯
        function renderCurrentLayer() {
            const currentLayer = navigationHistory[navigationHistory.length - 1];
            
            if (navigationHistory.length > 1) {
                const pathText = navigationHistory.map(layer => layer.title).join(" ➔ ");
                breadcrumbWrapper.innerHTML = `
                    <div class="breadcrumb-bar">
                        <button class="back-btn" onclick="goBack()">⬅ 回到上層</button>
                        <span class="current-path">${pathText}</span>
                    </div>
                `;
            } else {
                breadcrumbWrapper.innerHTML = ""; 
            }

            // 如果是首頁
            if (navigationHistory.length === 1) {
                contentWrapper.className = "hero-section"; 
                contentWrapper.innerHTML = `
                    <img class="hero-bg-image" src="${getDriveImageUrl('https://drive.google.com/file/d/14ISiHfqp98CF3PnQoaUB4AZwzfNh5oCE/view?usp=drive_link')}" alt="韋辰的滿版背景照片">
                    
                    <div class="hero-main-view">
                        <div class="hero-links-container">
                            <a class="hero-link-card" href="https://github.com/laiweichen0430-ship-it" target="_blank">🔗 個人 GitHub</a>
                            <a class="hero-link-card" href="https://linkedin.com/" target="_blank">💼 LinkedIn 履歷</a>
                            <a class="hero-link-card" href="https://line.me/ti/p/fEwpjBO26y" target="_blank">💬 聯絡我的 LINE</a>
                        </div>
                        <div class="hero-scroll-arrow" onclick="document.getElementById('profileSection').scrollIntoView({behavior: 'smooth'})">▼</div>
                    </div>

                    <div class="hero-profile-content" id="profileSection">
                        <div class="profile-text-box">
                            <h2>關於我 / About Me</h2>
                            <p>👋 哈囉！我是賴韋辰。目前專注於地球科學領域研究。</p>
                            <p>這裡是我的個人成果工作站，主要整理了我在實習期間的專案進度與學術簡報。</p>
                            <p>以下是我的履歷</p>
                            <p>市立福德國小</p>
                            <p>市立瑠公國中</p>
                            <p>市立內湖高中</p>
                            <p>國立中央大學地球科學系</p>
                        </div>
                    </div>
                `;
                return;
            }

            // 如果是內層卡片區
            contentWrapper.className = "main-content"; 
            
            let cardsHtml = "";
            if (currentLayer.items && currentLayer.items.length > 0) {
                currentLayer.items.forEach((item, index) => {
                    let reviewHtml = item.review ? `<div class="video-review">${item.review}</div>` : '';

                    if (item.items) {
                        cardsHtml += `
                            <div class="video-card" onclick="enterNextLayer(${index})">
                                <div class="thumbnail-box">
                                    <img src="${getDriveImageUrl(item.cover)}" alt="封面">
                                </div>
                                <div class="video-info">
                                    <p class="video-title">📁 ${item.title}</p>
                                    <p class="video-desc">${item.desc || ''}</p>
                                    ${reviewHtml}
                                </div>
                            </div>
                        `;
                    } else {
                        let mediaTag = "";
                        let cardClickAction = ""; 

                        if (item.type === "slide") {
                            mediaTag = `<img src="${getDriveImageUrl(item.cover)}" alt="簡報封面">`;
                            cardClickAction = `onclick="openMediaModal(${index})"`;
                        } else if (item.type === "multi-image") {
                            mediaTag = `<img src="${getDriveImageUrl(item.cover)}" alt="多圖封面">`;
                            cardClickAction = `onclick="openMediaModal(${index})"`;
                        } else if (item.type === "video") {
                            mediaTag = `<iframe src="${getDriveEmbedUrl(item.url)}" allowfullscreen></iframe>`;
                        } else if (item.type === "image") {
                            mediaTag = `<img src="${getDriveImageUrl(item.url)}" alt="圖片">`;
                        }

                        cardsHtml += `
                            <div class="video-card" ${cardClickAction}>
                                <div class="thumbnail-box">${mediaTag}</div>
                                <div class="video-info">
                                    <p class="video-title">${item.title}</p>
                                    <p class="video-desc">${item.desc || ''}</p>
                                    ${reviewHtml}
                                </div>
                            </div>
                        `;
                    }
                });
                
                contentWrapper.innerHTML = `<div class="youtube-grid">${cardsHtml}</div>`;
            } else {
                contentWrapper.innerHTML = "<p style='color:#606060; padding: 40px;'>這個資料夾目前空空的！</p>";
            }
        }

        function clickNavbarMenu(index) {
            navigationHistory = [websiteData];
            navigationHistory.push(websiteData.items[index]);
            renderCurrentLayer();
        }

        function goToHome() {
            navigationHistory = [websiteData];
            renderCurrentLayer();
        }

        function enterNextLayer(index) {
            const currentLayer = navigationHistory[navigationHistory.length - 1];
            if(currentLayer.items && currentLayer.items[index]) {
                navigationHistory.push(currentLayer.items[index]); 
                renderCurrentLayer();
            }
        }

        function goBack() {
            if (navigationHistory.length > 1) {
                navigationHistory.pop(); 
                renderCurrentLayer();
            }
        }

        function openMediaModal(index) {
            const currentLayer = navigationHistory[navigationHistory.length - 1];
            const item = currentLayer.items[index];
            
            document.getElementById('modalTitle').textContent = item.title;
            document.getElementById('modalMeta').textContent = item.desc || '';
            const modalBody = document.getElementById('modalBody');
            
            if (item.type === "slide") {
                modalBody.innerHTML = `<iframe src="${getDriveEmbedUrl(item.url)}" style="width:100%; height:65vh; border:none;"></iframe>`;
            } else if (item.type === "multi-image" && item.images) {
                let imgsHtml = item.images.map(img => `<img src="${getDriveImageUrl(img)}" style="width:100%; margin-bottom:15px; border-radius:8px;">`).join('');
                modalBody.innerHTML = `<div style="max-height:65vh; overflow-y:auto;">${imgsHtml}</div>`;
            }
            
            document.getElementById('mediaModal').classList.add('active'); 
        }

        function closeModal() {
            document.getElementById('mediaModal').classList.remove('active');
        }

        renderCurrentLayer();
    </script>
